function chip(name){
  if(!name||name==='-') return '<span style="color:#555577">–</span>';
  const col=C[name]||'#aaa';
  return `<span class="pw-runner-chip" style="color:${col};border:1px solid ${col}40"><span class="pw-dot" style="background:${col}"></span>${name}</span>`;
}

// ---- CSV PARSER ----
function parseCSV(text) {
  const lines = text.trim().split('\n').map(l => l.replace(/\r$/,''));
  // Find header row: first row that contains FUTÓ or Váltópont
  let headerIdx = 0;
  for(let i=0;i<lines.length;i++){
    if(lines[i].includes('FUT') || lines[i].includes('ltpont')){
      headerIdx=i; break;
    }
  }
  const splitLine = line => {
    const vals=[]; let cur='', inQ=false;
    for(let c of line){
      if(c==='"') inQ=!inQ;
      else if(c===',' && !inQ){vals.push(cur.trim().replace(/^"|"$/g,''));cur='';}
      else cur+=c;
    }
    vals.push(cur.trim().replace(/^"|"$/g,''));
    return vals;
  };
  const headers = splitLine(lines[headerIdx]).map(h=>h.trim());
  console.log('[UB] CSV headers found:', headers);
  return lines.slice(headerIdx+1).map(line => {
    const vals = splitLine(line);
    const row={};
    headers.forEach((h,i) => row[h] = vals[i]||'');
    return row;
  }).filter(r => Object.values(r).some(v=>v!==''));
}

// ---- TIME UTILS ----
// "02:05:00" -> minutes since midnight
function timeToMin(t) {
  if(!t) return null;
  const p = t.split(':');
  return parseInt(p[0])*60 + parseInt(p[1]);
}

// minutes -> "HH:MM"
function minToTime(m) {
  if(m===null||m===undefined) return '';
  const h = Math.floor(((m%1440)+1440)%1440/60);
  const mn = ((m%1440)+1440)%1440%60;
  return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');
}

// race start minutes since midnight
const RACE_START_MIN = 125; // 02:05

// arrival time string -> Date ISO for Open-Meteo
function arrivalToISO(timeStr) {
  if(!timeStr) return null;
  const min = timeToMin(timeStr.substring(0,5));
  if(min===null) return null;
  // if min < RACE_START_MIN, it's next day
  const d = new Date(RACE_DATE + 'T00:00:00');
  if(min < RACE_START_MIN - 30) d.setDate(d.getDate()+1);
  d.setHours(Math.floor(min/60), min%60, 0, 0);
  return d.toISOString().substring(0,16); // "2026-04-25T02:05"
}

// ---- WEATHER WMO CODE -> emoji ----
function wmoToIcon(code, isNight) {
  if(code<=1) return isNight?'🌙':'☀️';
  if(code<=3) return isNight?'🌙':'⛅';
  if(code<=49) return '🌫️';
  if(code<=67) return '🌧️';
  if(code<=77) return '❄️';
  if(code<=82) return '🌦️';
  if(code<=86) return '❄️';
  if(code<=99) return '⛈️';
  return '🌡️';
}
function wmoToDesc(code) {
  if(code===0) return 'Tiszta égbolt';
  if(code===1) return 'Majdnem tiszta';
  if(code===2) return 'Részben felhős';
  if(code===3) return 'Borult';
  if(code<=49) return 'Köd';
  if(code<=55) return 'Szitálás';
  if(code<=67) return 'Eső';
  if(code<=77) return 'Havazás';
  if(code<=82) return 'Zápor';
  if(code<=86) return 'Hózápor';
  if(code<=99) return 'Zivatar';
  return '';
}

// ---- FETCH WEATHER (Open-Meteo) ----
// Batch: for each W point with known arrival time, fetch hourly forecast
async function fetchWeatherForPoint(idx, wp, arrivalISO) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${wp.lat}&longitude=${wp.lon}&hourly=temperature_2m,weathercode&timezone=Europe%2FBudapest&start_date=2026-04-25&end_date=2026-04-27`;
    const r = await fetch(url);
    const d = await r.json();
    // Find closest hour to arrival
    const times = d.hourly.time;
    const targetHour = arrivalISO.substring(0,13); // "2026-04-25T02"
    let best = 0;
    for(let j=0;j<times.length;j++) {
      if(times[j].startsWith(targetHour)) { best=j; break; }
      if(times[j] <= arrivalISO) best=j;
    }
    const temp = Math.round(d.hourly.temperature_2m[best]);
    const code = d.hourly.weathercode[best];
    const hour = parseInt(arrivalISO.substring(11,13));
    const isNight = hour < 6 || hour >= 21;
    WCACHE[idx] = {
      temp, code,
      icon: wmoToIcon(code, isNight),
      desc: wmoToDesc(code),
      phase: isNight ? 'night' : 'day'
    };
  } catch(e) { console.warn('Weather fetch failed for W'+idx, e); }
}

async function fetchAllWeather() {
  const promises = W.map((wp,i) => {
    const arrival = wp.arrival || (i===0 ? '02:05' : null);
    const iso = arrivalToISO(arrival);
    if(!iso) return Promise.resolve();
    return fetchWeatherForPoint(i, wp, iso);
  });
  await Promise.all(promises);
  reRenderMarkers();
}

// ---- FETCH SHEETS ----
async function fetchSheets() {
  try {
    const vel = document.getElementById('ub-version');
    const t = Date.now();
    const [r1, r2] = await Promise.all([
      fetch(SHEETS_KALK + '&t=' + t, {cache:'no-store'}),
      fetch(SHEETS_VALTAS + '&t=' + t, {cache:'no-store'})
    ]);
    if(!r1.ok) { console.error('[UB] Kalk fetch error:', r1.status, r1.statusText); if(vel) vel.textContent='⚠️ Sheets hiba '+r1.status; return; }
    if(!r2.ok) { console.error('[UB] Valtas fetch error:', r2.status, r2.statusText); if(vel) vel.textContent='⚠️ Sheets hiba '+r2.status; return; }
    const [csv1, csv2] = await Promise.all([r1.text(), r2.text()]);
    console.log('[UB] csv1 first 200:', csv1.substring(0,200));
    console.log('[UB] csv2 first 200:', csv2.substring(0,200));

    // Change detection
    if(csv1 === _lastKalk && csv2 === _lastValtas) { console.log('[UB] No change in sheets'); return; }
    _lastKalk = csv1; _lastValtas = csv2;

    const kalkRows = parseCSV(csv1);
    const valtasRows = parseCSV(csv2);

    // Build váltás lookup by name
    const valtasMap = {};
    valtasRows.forEach(row => {
      const nm = (row['Váltópont']||'').trim();
      if(nm) valtasMap[nm] = row;
    });

    // Update W from kalk rows (skip header rows - find rows with ÉRKEZÉS data)
    // kalk has 58 data rows after headers (F4 = first header)
    // CSV will have some empty leading rows - filter to rows with ÉRKEZÉS value
    console.log('[UB] kalkRows sample:', kalkRows.slice(0,3));
    const dataRows = kalkRows.filter(r => {
      const erkezes = r['ÉRKEZÉS'] || r['\u00c9RKEZ\u00c9S'] || '';
      return erkezes.match(/\d{1,2}:\d{2}/);
    });
    console.log('[UB] dataRows found:', dataRows.length);

    dataRows.forEach((row, segIdx) => {
      const idx = segIdx + 1; // W[0]=Rajt, W[1]=Aszófő etc. segIdx 0 = seg 1 end = W[1]
      if(idx >= W.length) return;

      // Update arrival time at destination W point
      const arrTime = (row['VÁLTÓPONTHOZ ÉRKEZÉS IDEJE']||'').substring(0,5);
      if(arrTime) W[idx].arrival = arrTime;

      // Update runner for this segment's departure from W[segIdx]
      const runner = (row['FUT\u00d3']||row['FUTÓ']||'').trim();
      if(runner) {
        if(W[segIdx].departures && W[segIdx].departures.length > 0) {
          W[segIdx].departures[0].runner = runner;
        } else if(W[segIdx].departures) {
          W[segIdx].departures.push({runner, to: W[idx].name, sponsor:''});
        }
        if(W[idx].arrivals && W[idx].arrivals.length > 0) {
          W[idx].arrivals[0].runner = runner;
        } else if(W[idx].arrivals) {
          W[idx].arrivals.push({runner, from: W[segIdx].name, sponsor:'', time:''});
        }
      }

      // Update departure time (INDULÁS) on W[segIdx]
      const depTime = (row['INDULÁS']||'').substring(0,5);
      if(depTime && segIdx === 0) W[0].arrival = depTime;
    });

    // Update W from váltás map (relay points)
    W.forEach((wp, i) => {
      const v = valtasMap[wp.name];
      if(!v) return;
      // Update relay times
      const valtasIdo = (v['Váltás ideje']||'').substring(0,5);
      if(valtasIdo) {
        wp.arrival = valtasIdo;
        wp.relay_time = valtasIdo;
      }
      // Update relay runners
      const f1 = (v['Futó1']||'').trim();
      const f2 = (v['Futó2']||'').trim();
      const v1 = (v['Váltó1']||'').trim();
      const v2 = (v['Váltó2']||'').trim();
      if(wp.relay) {
        if(f1||f2) wp.relay.futak = [f1||'-', f2||'-'];
        if(v1||v2) wp.relay.valtak = [v1||'-', v2||'-'];
      }
      // Update car/driver
      const sofor = (v['Sofőr a váltópontra']||'').trim();
      const kocsi1 = (v['Kocsi1 - váltó']||'').trim();
      const kocsi2 = (v['Kocsi2 - maradó']||'').trim();
      const indulas = (v['Indulás a szállásról']||'').trim();
      if(sofor) wp.sofor = sofor;
      if(kocsi1) wp.kocsi = kocsi1;
      if(kocsi2) wp.kocsi2 = kocsi2;
      if(indulas) wp.indulas_szallasrol = indulas;
    });

    reRenderMarkers();
    const now=new Date();
    const vStr='v'+String(now.getDate()).padStart(2,'0')+'.'+String(now.getMonth()+1).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
    const vel=document.getElementById('ub-version');
    if(vel) vel.textContent=vStr;
  } catch(e) { console.error('Sheets fetch error:', e); }
}

// ---- RE-RENDER W MARKERS ----
function reRenderMarkers() {
  WLayer.clearLayers();
  W.forEach((wp, i) => {
    // Inject weather from cache
    if(WCACHE[i]) {
      wp.weather = WCACHE[i];
      wp.light = WCACHE[i].phase;
    }
    renderWMarker(wp, i);
  });
}

// ---- INIT + INTERVALS ----
async function init() {
  reRenderMarkers();       // initial render with static data
  await fetchSheets();     // load sheets data
  await fetchAllWeather(); // load weather forecasts
  setInterval(fetchSheets, 1 * 60 * 1000);        // every 1 min
  setInterval(fetchAllWeather, 30 * 60 * 1000);   // every 30 min
}
