<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#12122a;color:#fff;display:flex;flex-direction:column;height:100dvh}
header{padding:10px 18px;background:#1a1a35;border-bottom:1px solid #2a2a50;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:15px;font-weight:700}
header p{font-size:10px;color:#9999cc}
#map{flex:1;width:100%;position:relative}
#ctrl{padding:6px 18px;background:#1a1a35;border-top:1px solid #2a2a50;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
#ctrl>span{font-size:11px;color:#7777aa}
.btn{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:18px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-size:11px;transition:opacity .2s;user-select:none}
.btn.off{opacity:.3}
.rdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.leaflet-popup-content-wrapper{background:#1e1e3a;border:1px solid #3a3a60;border-radius:10px;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.7)}
.leaflet-popup-tip{background:#1e1e3a}
.leaflet-popup-content{margin:11px 14px;font-size:12px;line-height:1.6}
.leaflet-tooltip{background:#1e1e3a;border:1px solid #3a3a60;color:#fff;font-size:11px;border-radius:5px;padding:3px 7px;white-space:nowrap}
.leaflet-tooltip-top:before{border-top-color:#3a3a60}
.pw-title{font-weight:700;font-size:14px;color:#ddeeff;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid #2a2a50;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.pw-arrival{font-size:11px;color:#88ffcc;font-weight:600;white-space:nowrap}
.pw-weather{display:flex;align-items:center;gap:8px;padding:5px 8px;background:rgba(100,160,255,.07);border:1px solid rgba(100,160,255,.18);border-radius:7px;margin:5px 0;font-size:12px}
.pw-weather-icon{font-size:17px}
.pw-weather-temp{font-size:14px;font-weight:700;color:#aaddff}
.pw-weather-desc{font-size:10px;color:#8899cc}
.pw-relay-box{background:rgba(255,200,0,.07);border:1px solid rgba(255,200,0,.25);border-radius:7px;padding:7px 9px;margin:5px 0}
.pw-relay-time{font-size:12px;color:#ffd700;font-weight:700}
.pw-relay-row{display:flex;align-items:center;gap:5px;margin:2px 0;font-size:11px}
.pw-relay-label{font-size:9px;color:#998855;width:38px;flex-shrink:0}
.pw-car-grid{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,200,0,.15);font-size:10px}
.pw-car-label{color:#998855;white-space:nowrap}
/* ── Mobile optimalizálás ── */
@media (max-width:600px) {
  header{padding:7px 12px;gap:8px}
  header h1{font-size:13px}
  #ctrl{padding:5px 10px;gap:4px}
  .btn{padding:4px 10px;font-size:11px;min-height:32px}
  .leaflet-popup-content-wrapper{max-width:94vw!important}
  .leaflet-popup-content{margin:10px 12px!important}
  
  .pw-navbtn{width:44px!important;height:44px!important}
  #statsPanel{max-height:45vh;overflow-y:auto}
}
/* ── GPS gomb ── */
#gpsBtn{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:18px;
  border:1px solid rgba(74,144,226,.5);background:rgba(74,144,226,.15);
  color:#7ab8f5;cursor:pointer;font-size:11px;transition:all .2s;user-select:none;white-space:nowrap}
#gpsBtn.gps-on{background:rgba(74,144,226,.35);border-color:#4A90E2;color:#fff;
  box-shadow:0 0 8px rgba(74,144,226,.5)}
/* ── Stats panel ── */
#statsPanel{padding:6px 16px 6px;background:#1a1a35;border-top:1px solid #2a2a50;display:none}
#statsPanel.visible{display:block}
.stats-title{font-size:11px;color:#7777aa;margin-bottom:4px}
.stat-row{display:grid;grid-template-columns:10px 70px 52px 72px 30px;
  align-items:center;gap:6px;padding:2px 0;font-size:11px}
.stat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stat-name{font-weight:600}
.stat-km{color:#ccd;text-align:right}
.stat-pace{color:#99aacc;font-size:10px}
.stat-segs{color:#667;font-size:10px}
/* ── Countdown ── */
.pw-countdown{font-size:11px;color:#ffcc44;margin-left:6px;font-weight:600}
/* ── Stat toggle gomb ── */
#statsBtn{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:18px;
  border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);
  color:#9999cc;cursor:pointer;font-size:11px;transition:all .2s;user-select:none}
#statsBtn.active{background:rgba(255,255,255,.18);color:#fff}

/* ── Weather + Nav inline row ── */
.pw-weather-nav-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pw-weather-nav-row .pw-weather{flex:1;margin-bottom:0}
.pw-nav-inline{display:flex;gap:5px;flex-shrink:0}
.pw-nav-inline .pw-navbtn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* ── Váltásig hátralévő idő ── */




/* ── Szállás info blokk ── */
.pw-szallas-box{margin-top:5px;padding:6px 8px;border-top:1px solid rgba(255,255,255,0.1);
  display:flex;flex-direction:column;gap:3px}
.pw-szallas-row{display:flex;align-items:center;gap:8px;font-size:11px}
.pw-indulj{color:#88ddff;font-weight:700;font-size:12px}

/* ── Stat panel D+ column ── */
.stat-row{grid-template-columns:10px 70px 52px 72px 42px 30px}
.stat-dplus{color:#88cc88;font-size:10px;text-align:right}

/* ── Stat gomb ── */
#statBtn{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:18px;
  border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);
  color:#9999cc;cursor:pointer;font-size:11px;transition:all .2s;user-select:none}
#statBtn:hover{background:rgba(255,255,255,.18);color:#fff}

/* ── Aktív szegmens animáció ── */
@keyframes seg-pulse { 0%{opacity:1} 50%{opacity:0.5} 100%{opacity:1} }
.seg-active { animation: seg-pulse 1.8s ease-in-out infinite; }

/* ── Pace chip ── */
.pw-pace-row { display:flex; flex-wrap:nowrap; gap:4px; margin-top:5px; overflow-x:auto; }
.pw-pace-chip {
  font-size:10px; padding:2px 7px; border-radius:10px;
  background:rgba(120,120,200,0.18); color:#aabbdd;
  border:1px solid rgba(120,120,200,0.25); white-space:nowrap;
}

/* ── Szél ── */
.pw-wind { font-size:10px; color:#88bbdd; margin-left:5px; }

.pw-relay-title{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:12px;color:#aaaacc;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.pw-relay-cd{text-align:right;line-height:1.2}
.pw-relay-cd-label{font-size:10px;color:#8888aa;font-weight:400}
.pw-relay-cd-val{font-size:13px;color:#FFD700;font-weight:700}
.pw-relay-people{display:flex;gap:8px;margin-bottom:6px}
.pw-relay-unit{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:6px 8px}
.pw-relay-unit .pw-relay-label{display:block;font-size:10px;color:#8888aa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.pw-relay-chips{display:flex;gap:5px;flex-wrap:wrap}

.pw-title{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;font-size:15px;font-weight:700;color:#eeeeff;margin-bottom:4px;padding-bottom:5px;border-bottom:1px solid #2a2a50}
.pw-wp-name{flex:1;min-width:0;word-break:break-word;line-height:1.3;font-size:14px;font-weight:700;color:#eeeeff}
.pw-arrival{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:1;line-height:1.3;min-width:0}
.pw-arrival-label{font-size:10px;color:#9999bb}
.pw-arrival-time{font-size:13px;color:#ffcc55;font-weight:700}
.pw-checkin-btn{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;touch-action:manipulation;line-height:1.4;white-space:nowrap;flex-shrink:0}
.pw-checkin-go{border:1px solid rgba(80,200,100,.5);background:rgba(80,200,100,.18);color:#66dd88}
.pw-checkin-revoke{border:1px solid rgba(255,80,80,.5);background:rgba(255,80,80,.15);color:#ff7777}
.pw-section-label{font-size:10px;color:#7777aa;text-transform:uppercase;letter-spacing:.6px;margin:10px 0 5px}
.pw-seg{border-left:3px solid;border-radius:0 8px 8px 0;padding:7px 8px 7px 10px;margin-bottom:6px;background:rgba(255,255,255,0.03)}
.pw-seg-body{display:flex;flex-direction:column;gap:3px}
.pw-seg-runner{font-size:12px;font-weight:700}
.pw-seg-route{font-size:11px;color:#9999cc}
.pw-seg-sponsor{font-size:10px;color:#b8963e;margin-top:3px;font-style:italic}
.pw-seg-atbtn{display:flex;justify-content:flex-end;margin-top:4px}

.leaflet-popup-content { min-width: 280px; max-width: 480px; }
.leaflet-popup-content-wrapper { max-width: 500px !important; }

.pw-info-row{display:flex;gap:8px;margin-top:6px;align-items:flex-start;padding-top:6px;border-top:1px solid rgba(255,200,0,.15)}
.pw-info-row .pw-car-grid{flex:1;min-width:0;margin-top:0;padding-top:0;border-top:none}
.pw-info-row .pw-szallas-box{flex:1;min-width:0;margin-top:0;padding:6px 8px;border-top:none;border-left:1px solid rgba(255,255,255,0.1)}

/* Ki fut most bar */
#nowRunning{transition:opacity .3s}

/* Stats summary */
.stats-summary{margin-top:8px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.1);font-size:11px;color:#aaaacc}
.stats-sum-row{margin-bottom:5px}
.stats-sum-row b{color:#eeeeff}
.stats-progbar{height:5px;background:rgba(255,255,255,0.1);border-radius:3px;margin-top:3px;overflow:hidden}
.stats-progfill{height:100%;background:linear-gradient(90deg,#4488ff,#44ddaa);border-radius:3px;transition:width .5s}

/* Mobile responsive popup – iPhone 13-17 (375-430px wide) */
@media (max-width:480px){
  .leaflet-popup-content-wrapper{max-width:96vw!important;border-radius:12px!important;max-height:70vh;overflow-y:auto}
  .leaflet-popup-content{min-width:unset!important;margin:10px 11px!important}
  .pw-title{gap:6px}
  .pw-wp-name{font-size:13px}
  .pw-arrival{max-width:unset}

function showToast(msg, type='error', interactive=false) {
  const el = document.createElement('div');
  const bg = type === 'error' ? '#2a1010' : '#102a14';
  const col = type === 'error' ? '#ff9977' : '#88ffbb';
  const border = type === 'error' ? 'rgba(255,80,80,.4)' : 'rgba(80,200,100,.4)';
  el.style.cssText = `position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:${bg};color:${col};border:1px solid ${border};padding:10px 16px;border-radius:8px;font-size:13px;z-index:29999;max-width:90vw;text-align:center;pointer-events:${interactive?'auto':'none'};transition:opacity .4s`;
  el.innerHTML = msg;
  document.body.appendChild(el);
  const hide = () => { el.style.opacity='0'; setTimeout(() => el.remove(), 400); };
  if (interactive) el.addEventListener('click', hide);
  setTimeout(hide, 4500);
}

function setStatus(ok, msg) {

    el = document.createElement('div');
    el.id = '_dynStatus';
    el.style.cssText = 'position:fixed;top:8px;right:10px;z-index:9999;font-size:11px;padding:4px 11px;border-radius:10px;pointer-events:none;transition:all .4s';
    document.body.appendChild(el);
  }
  let bar = document.getElementById('_offlineBar');
  if (!ok && msg && msg.includes('Offline')) {
    if (!bar) {
      bar = document.createElement('div');
      bar.id = '_offlineBar';
      bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9998;background:rgba(160,100,0,0.93);color:#fff;font-size:12px;font-weight:700;text-align:center;padding:6px;pointer-events:none;backdrop-filter:blur(3px)';
      document.body.appendChild(bar);
    }
    bar.textContent = '⚠️ Offline – ' + msg.replace('Offline – ','');
    bar.style.display = 'block';
  } else if (bar) { bar.style.display = 'none'; }
  el.style.background = ok ? 'rgba(40,160,80,0.85)' : (msg&&msg.includes('Offline')) ? 'rgba(160,100,0,0.85)' : 'rgba(180,40,40,0.85)';
  el.style.color = '#fff';
  el.textContent = ok ? '✓ ' + msg : msg;
  el.style.opacity = '1';
  if (ok) setTimeout(() => { el.style.opacity='0'; }, 4000);
}

function parseCSV(text) {
  const rows = [];
  for (const rawline of text.split('\n')) {
    const line = rawline.replace(/\r/g, '');
    const row = []; let inQ = false, cur = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    row.push(cur.trim());
    rows.push(row);
  }
  return rows;
}

async function fetchWeather() {
  if (_weatherCache && Date.now() - _weatherLastFetch < 29*60*1000) return;
  const pts = [{lat:46.948,lon:17.873},{lat:46.762,lon:17.246},{lat:46.906,lon:18.049},{lat:46.849,lon:17.891}];
  const cache = {};
  try {
    await Promise.all(pts.map(async pt => {
      const u = 'https://api.open-meteo.com/v1/forecast?latitude='+pt.lat+'&longitude='+pt.lon+
                '&hourly=temperature_2m,weathercode,windspeed_10m,winddirection_10m&timezone=Europe%2FBudapest&forecast_days=16';
      const r = await fetch(u);
      if (!r.ok) throw new Error('HTTP '+r.status);
      const d = await r.json();
      cache[pt.lat.toFixed(2)] = d;
    }));
    _weatherCache = cache; _weatherLastFetch = Date.now();
  } catch(e) { console.warn('Weather fetch error (non-fatal):', e); }
}


function getWeather(lat, arrStr) {
  if (!_weatherCache || !arrStr) return null;
  const hh = parseInt(arrStr.split(':')[0], 10);
  if (isNaN(hh)) return null;
  const dateStr = (hh < 2 ? '2026-04-26T' : '2026-04-25T') + String(hh).padStart(2,'0') + ':00';
  const keys = Object.keys(_weatherCache);
  if (!keys.length) return null;
  const best = keys.reduce((a,b) => Math.abs(parseFloat(a)-lat) < Math.abs(parseFloat(b)-lat) ? a : b);
  const d = _weatherCache[best];
  if (!d || !d.hourly) return null;
  const idx = d.hourly.time.indexOf(dateStr);
  if (idx < 0) return null;
  const temp = Math.round(d.hourly.temperature_2m[idx]);
  const code = d.hourly.weathercode[idx];
  const isNight = hh < 6 || hh >= 20;
  const [ic0, desc] = WMO[code] || ['🌡️','Ismeretlen'];
  const icon = isNight && code <= 1 ? '🌙' : ic0;
  const wind = d.hourly.windspeed_10m ? Math.round(d.hourly.windspeed_10m[idx]) : null;
  const windDir = d.hourly.winddirection_10m ? d.hourly.winddirection_10m[idx] : null;
  const windDirStr = windDir!=null ? ['É','ÉK','K','DK','D','DNy','Ny','ÉNy'][Math.round(windDir/45)%8] : '';
  return {temp, icon, desc, phase: isNight ? 'night' : 'day', wind, windDir: windDirStr};
}

function applyUB26(rows) {
  const M = {};
  for (const r of rows) {
    const n = (r[5]||'').trim();
    if (!n || isNaN(+n)) continue;
    const from = (r[7]||'').trim(), to = (r[8]||'').trim();
    const arr = (r[13]||'').trim();
    M[from+'|||'+to] = { runner:(r[10]||'').trim(), arrival: arr ? arr.split(':').slice(0,2).join(':') : '' };
  }
  function find(f, t) {
    if (M[f+'|||'+t]) return M[f+'|||'+t];
    const f6=f.trim().slice(0,8), t6=t.trim().slice(0,8);
    const k=Object.keys(M).find(k=>{const[a,b]=k.split('|||');return a.slice(0,8)===f6&&b.slice(0,8)===t6;});
    return k ? M[k] : null;
  }
  S.forEach(seg => {
    const d = find(seg.from, seg.to);
    if (d) { seg.runner = d.runner; seg.time_to = d.arrival; }
  });
  const sr = rows.find(r => /^\d+:\d+/.test((r[3]||'').trim()));
  S[0].time_from = sr ? sr[3].trim().split(':').slice(0,2).join(':') : '';
  for (let i=1; i<S.length; i++) S[i].time_from = S[i-1].time_to || '';
  W.forEach(wp => {
    wp.arrivals.forEach(arr => {
      const d = find(arr.from, wp.name);
      if (d) { arr.time = d.arrival; arr.runner = d.runner; }
    });
    const ts = wp.arrivals.map(a=>a.time).filter(Boolean);
    if (ts.length) wp.arrival = ts[ts.length-1];
    wp.departures.forEach(dep => {
      const d = find(wp.name, dep.to);
      if (d) dep.runner = d.runner;
    });
    const arrR = wp.arrivals.length ? wp.arrivals[wp.arrivals.length-1].runner : null;
    const depR = wp.departures.length ? wp.departures[0].runner : null;
    if (arrR && depR && arrR !== depR) { wp.runner_change={out:arrR,in:depR}; wp.is_relay_white=true; }
    else { wp.runner_change = null; wp.is_relay_white = false; }
  });
}



function applyValtas(rows) {
  // Build CSV lookup: name → array of rows (keep duplicates like start/finish)
  const V = {};
  for (let i = 1; i < rows.length; i++) {
    const n = (rows[i][0]||'').trim();
    if (!n || n === 'Váltópont') continue;
    if (!V[n]) V[n] = [];
    V[n].push(rows[i]);
  }

  function normName(s) {
    return s.toLowerCase().trim()
      .replace(/kelet/g,'').replace(/nyugat/g,'').replace(/\bk\b\.?/g,'').replace(/\bny\b\.?/g,'')
      .replace(/versenyközpont/g,'').replace(/kampusz/g,'')
      .replace(/\s+/g,' ').trim().replace(/\.$/,'');
  }

  // Build reverse: normName → array of CSV keys
  const Vnorm = {};
  Object.keys(V).forEach(k => {
    const nn = normName(k);
    if (!Vnorm[nn]) Vnorm[nn] = [];
    Vnorm[nn].push(k);
  });

  function getRows(wpName, isFinish) {
    // Exact name match first
    if (V[wpName]) return isFinish ? [V[wpName][V[wpName].length-1]] : [V[wpName][0]];
    // Normalized match - only returns rows for first/last as needed
    const nn = normName(wpName);
    const keys = Vnorm[nn] || [];
    if (!keys.length) return null;
    const allRows = keys.flatMap(k => V[k]);
    return [isFinish ? allRows[allRows.length-1] : allRows[0]];
  }

  // Step 1: Reset all non-finish special waypoints
  W.forEach(wp => {
    if (wp.special && !wp.finish) {
      wp.special = false;
      wp.relay = null; wp.relay_time = '';
      wp.sofor = ''; wp.kocsi = ''; wp.kocsi2 = '';
      wp._szallas = ''; wp._indulas = ''; wp._autoidő = '';
      wp._indulj = ''; wp._szallason = [];
    }
  });

  // Step 2: Update originally-special W waypoints from CSV
  const activatedCsvNames = new Set();
  W.forEach(wp => {
    // Only process waypoints that were originally special
    if (!_origSpecial.has(wp.name + '|' + (wp.finish||false))) return;
    const rows = getRows(wp.name, wp.finish||false);
    if (!rows || !rows.length) return;
    const row = rows[0];
    activatedCsvNames.add((row[0]||'').trim());
    applyRow(wp, row);
  });

  // Step 3: New relay points - CSV names not yet matched → exact W name match only
  Object.keys(V).forEach(csvName => {
    if (activatedCsvNames.has(csvName)) return;
    const wp = W.find(w => w.name === csvName && !w.special && !w.finish);
    if (!wp) return;
    applyRow(wp, V[csvName][0]);
  });

  function applyRow(wp, row) {
    const vt = (row[1]||'').trim();
    wp.special = true;
    wp.relay_time = vt ? vt.split(':').slice(0,2).join(':') : '';
    // wp.arrival comes only from FUTÓK CSV r[13]
    if (!wp.relay) wp.relay = {};
    wp.relay.futak  = [(row[5]||'-').trim(), (row[6]||'-').trim()];
    wp.relay.valtak = [(row[7]||'-').trim(), (row[8]||'-').trim()];
    wp.sofor  = (row[9] ||'').trim();
    wp.kocsi  = (row[10]||'').trim();
    wp.kocsi2 = (row[11]||'').trim();
    wp._szallason = [row[12],row[13],row[14]].map(s=>(s||'').trim()).filter(Boolean);
    wp._szallas = (row[2]||'').trim();
    const _indRaw  = (row[3]||'').trim();
    const _autoRaw = (row[4]||'').trim();
    wp._autoidő = _autoRaw ? _autoRaw.split(':').slice(0,2).join(':') : '';
    if (_indRaw) {
      wp._indulas = _indRaw.split(':').slice(0,2).join(':');
    } else if (wp.relay_time && _autoRaw) {
      const [rh,rm] = wp.relay_time.split(':').map(Number);
      const [ah,am] = _autoRaw.split(':').map(Number);
      let depMin = rh*60+rm - (ah*60+am);
      if (depMin < 0) depMin += 24*60;
      wp._indulas = String(Math.floor(depMin/60)).padStart(2,'0')+':'+String(depMin%60).padStart(2,'0');
    } else { wp._indulas = ''; }
  }
}

function toggleGPS() {
  const btn = document.getElementById('gpsBtn');
  if (_gpsActive) {
    stopGPS(); btn.classList.remove('gps-on');
    btn.title = 'GPS követés bekapcsolása';
  } else {
    startGPS(); btn.classList.add('gps-on');
    btn.title = 'GPS követés kikapcsolása';
  }
}

function startGPS() {
  if (!navigator.geolocation) { showToast('GPS nem elérhető ezen az eszközön.'); return; }
  _gpsActive = true;
  _gpsWatchId = navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude, lon = pos.coords.longitude;
    const acc = pos.coords.accuracy;
    if (!_gpsMarker) {
      const icon = L.divIcon({
        html: '<div style="width:16px;height:16px;background:#4A90E2;border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(74,144,226,0.8)"></div>',
        iconSize:[16,16], iconAnchor:[8,8], className:''
      });
      _gpsMarker = L.marker([lat,lon],{icon,zIndexOffset:1000}).addTo(map);
      _gpsMarker.bindTooltip('📍 Te vagy itt', {direction:'top',offset:[0,-8],opacity:0.95});
      _gpsCircle = L.circle([lat,lon],{radius:acc,color:'#4A90E2',fillColor:'#4A90E2',fillOpacity:0.1,weight:1}).addTo(map);
      map.setView([lat,lon], Math.max(map.getZoom(), 14));
    } else {
      _gpsMarker.setLatLng([lat,lon]);
      _gpsCircle.setLatLng([lat,lon]).setRadius(acc);
    }
  }, err => {
    console.warn('GPS hiba:', err.message);
    const msg = err.code===1 ? 'Engedély megtagadva' : err.code===2 ? 'Helymeghatározás nem elérhető' : err.message;
    setStatus(false, 'GPS: ' + msg);
    stopGPS();
    const btn = document.getElementById('gpsBtn');
    if (btn) btn.classList.remove('gps-on');
  }, {enableHighAccuracy:true, maximumAge:5000, timeout:15000});
}

function stopGPS() {
  _gpsActive = false;
  if (_gpsWatchId) navigator.geolocation.clearWatch(_gpsWatchId);
  if (_gpsMarker) { map.removeLayer(_gpsMarker); map.removeLayer(_gpsCircle); _gpsMarker=null; _gpsCircle=null; }
}

// VISSZASZÁMLÁLÓ (relay_time - most, verseny napján)
// ═══════════════════════════════════════════════════════════════════════════════
const RACE_DATE = '2026-04-25';

function parseRaceTime(hhmm) {
  if (!hhmm || !hhmm.includes(':')) return null;
  const [hh, mm] = hhmm.split(':').map(Number);
  const d = new Date(RACE_DATE + 'T00:00:00');
  d.setHours(hh, mm, 0, 0);
  // If time < 02:05 (start), assume next day
  if (hh < 2 || (hh === 2 && mm < 5)) d.setDate(d.getDate() + 1);
  return d;
}

function formatCountdown(ms) {
  if (ms <= 0) return null;
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return h + 'ó ' + String(m).padStart(2,'0') + 'p';
  return m + 'p ' + String(s).padStart(2,'0') + 'mp';
}

function getCountdown(timeStr) {
  if (!timeStr) return null;
  const target = /T/.test(timeStr) ? new Date(timeStr) : parseRaceTime(timeStr);
  if (!target || isNaN(target.getTime())) return null;
  const ms = target.getTime() - Date.now();
  if (ms < 0) return null;
  return formatCountdown(ms);
}

function updateCountdowns() {
  document.querySelectorAll('[data-countdown]').forEach(el => {
    const cd = getCountdown(el.dataset.countdown);
    el.textContent = cd ? '⏳ ' + cd : '✓';
    el.style.color = cd ? '#ffcc44' : '#55ee88';
  });
}
setInterval(updateCountdowns, 1000);

// HAVERSINE TÁVOLSÁG (JS)
// ═══════════════════════════════════════════════════════════════════════════════
function segDistKm(coords) {
  if (!coords || coords.length < 2) return 0;
  let d = 0;
  const R = 6371;
  for (let i = 0; i < coords.length - 1; i++) {
    const [lat1,lon1] = coords[i], [lat2,lon2] = coords[i+1];
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    d += 2 * R * Math.asin(Math.sqrt(a));
  }
  return d;
}

// Use pre-baked km if available, else haversine
function segKm(seg) {
  if (seg.km) return seg.km;
  return segDistKm(seg.coords);
}

// CHECK-IN helperek + delta propagáció
// ═══════════════════════════════════════════════════════════════════════════════
function hhmmToMin(s) {
  if (!s || !s.includes(':')) return null;
  const [h, m] = s.split(':').map(Number);
  if (isNaN(h) || isNaN(m)) return null;
  return h*60 + m;
}
function minToHhmm(mins) {
  mins = ((mins % 1440) + 1440) % 1440;
  return String(Math.floor(mins/60)).padStart(2,'0') + ':' + String(mins%60).padStart(2,'0');
}
function fmtDeltaMin(d) {
  if (d === 0) return '±0p';
  const sign = d > 0 ? '+' : '−';
  const a = Math.abs(d);
  if (a < 60) return sign + a + 'p';
  const h = Math.floor(a/60), m = a%60;
  return sign + h + 'ó' + (m ? ' '+m+'p' : '');
}
function fmtDeltaLabel(d) {
  if (d === 0) return '';
  const a = Math.abs(d);
  const magn = a < 60 ? (a + 'p') : (Math.floor(a/60) + 'ó' + (a%60 ? ' '+(a%60)+'p' : ''));
  return d > 0 ? (magn + ' késés') : (magn + ' gyorsabb');
}
function fmtHHMM(d) {
  if (!(d instanceof Date) || isNaN(d.getTime())) return '';
  return d.toLocaleTimeString('hu-HU', {hour:'2-digit', minute:'2-digit', timeZone:'Europe/Budapest'});
}
// Minuták szerinti signed delta két Date között (planned→actual).
// Valódi Date objektumok → nincs wrap szükség, a nyers különbség pontos.
function deltaMinDates(pd, ad) {
  if (!pd || !ad) return 0;
  return Math.round((ad.getTime() - pd.getTime()) / 60000);
}
// Check-in rekord → Date (datetime vagy legacy time fallback-kel)
function ciToDate(ci) {
  if (!ci) return null;
  if (ci.datetime) {
    const d = new Date(ci.datetime);
    if (!isNaN(d.getTime())) return d;
  }
  if (ci.time) return parseRaceTime(ci.time);
  return null;
}

async function fetchCheckins() {
  if (!CHECKIN_URL || _pendingCheckins > 0) return;
  try {
    const r = await fetch(CHECKIN_URL + '?_t=' + Date.now());
    if (!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    if (data && typeof data === 'object' && !data.error && _pendingCheckins === 0) {
      // Backward-compat: régi script flat { wp: {...} }, új script { checkins:{}, positions:{} }
      const checkins = data.checkins || data;
      const positions = data.positions || {};
      Object.keys(CHECKINS).forEach(k => delete CHECKINS[k]);
      Object.keys(checkins).forEach(k => { CHECKINS[k] = checkins[k]; });
      saveCheckinsCache();
      Object.keys(POSITIONS).forEach(k => delete POSITIONS[k]);
      Object.keys(positions).forEach(k => { POSITIONS[k] = positions[k]; });
    }
  } catch(e) { console.warn('Checkin fetch (non-fatal):', e); }
}

async function postCheckin(waypoint, datetime, runner) {
  if (!CHECKIN_URL) { showToast('Check-in URL nincs beállítva.'); return false; }
  try {
    const r = await fetch(CHECKIN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ waypoint, datetime, runner })
    });
    if (!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || 'ismeretlen hiba');
    return true;
  } catch(e) { showToast('Check-in hiba: ' + e.message); return false; }
}

// ── F3: Live GPS megosztás ─────────────────────────────────────────────────

function haversineM(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function postPosition(lat, lon, acc) {
  if (!CHECKIN_URL || !ACTIVE_RUNNER) return;
  try {
    await fetch(CHECKIN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ type: 'position', runner: ACTIVE_RUNNER, lat, lon, acc: acc || null })
    });
  } catch(e) { /* non-fatal, next interval will retry */ }
}

function startGPSSharing() {
  if (!navigator.geolocation || !ACTIVE_RUNNER || !CHECKIN_URL) return;
  if (_gpsShareWatchId !== null) return; // már fut
  _gpsShareWatchId = navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude, lon = pos.coords.longitude, acc = pos.coords.accuracy;
    if (_lastSharedLat !== null) {
      const dist = haversineM(_lastSharedLat, _lastSharedLon, lat, lon);
      if (dist < 20) return; // 20m küszöb alatt nem küldünk
    }
    _lastSharedLat = lat; _lastSharedLon = lon;
    postPosition(lat, lon, acc);
  }, err => {
    console.warn('GPS share hiba:', err.message);
  }, { enableHighAccuracy: false, maximumAge: 15000, timeout: 20000 });
}

function stopGPSSharing() {
  if (_gpsShareWatchId !== null) {
    navigator.geolocation.clearWatch(_gpsShareWatchId);
    _gpsShareWatchId = null;
  }
  _lastSharedLat = null; _lastSharedLon = null;
}

function requestGPSSharing() {
  if (!ACTIVE_RUNNER || !CHECKIN_URL || !navigator.geolocation) return;
  if (_gpsShareWatchId !== null) return; // már fut
  navigator.permissions && navigator.permissions.query({ name: 'geolocation' }).then(res => {
    if (res.state === 'granted') {
      startGPSSharing();
    } else if (res.state === 'prompt') {
      // engedélykérés: elindítjuk, ami automatikusan kiváltja a prompt-ot
      startGPSSharing();
    }
    // 'denied' esetén csendben nem indítjuk el
  }).catch(() => { startGPSSharing(); }); // ha permissions API nem elérhető, próbáljuk
}

function updatePositionMarkers() {
  const DIM_MS = 10 * 60 * 1000; // 10 perc felett halványabb
  const now = Date.now();
  Object.entries(POSITIONS).forEach(([runner, pos]) => {
    if (!pos || isNaN(pos.lat) || isNaN(pos.lon)) return;
    const tsMs = pos.ts ? new Date(pos.ts).getTime() : 0;
    const ageMs = now - tsMs;
    const color = C[runner] || '#aaaaaa';
    const opacity = (tsMs && ageMs > DIM_MS) ? 0.35 : 1;
    const existing = _posMarkers.get(runner);
    const latlng = [pos.lat, pos.lon];
    const iconHtml = `<div style="opacity:${opacity};filter:drop-shadow(0 0 4px ${color})"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="${color}"><circle cx="12" cy="5" r="3.5"/><path d="M12 10c-3.5 0-6 1.8-6 4v2h12v-2c0-2.2-2.5-4-6-4z"/></svg></div>`;
    const icon = L.divIcon({ html: iconHtml, iconSize:[22,22], iconAnchor:[11,11], className:'' });
    const ageMin = tsMs ? Math.round(ageMs / 60000) : null;
    const ageLabel = ageMin === null ? '' : ageMin < 1 ? ' · most' : ` · ${ageMin} perce`;
    const tooltip = runner + ageLabel;
    if (existing) {
      existing.setLatLng(latlng).setIcon(icon);
      existing.unbindTooltip();
      existing.bindTooltip(tooltip, { direction:'top', offset:[0,-7], opacity:0.95 });
    } else {
      const m = L.marker(latlng, { icon, zIndexOffset: 900 }).addTo(map);
      m.bindTooltip(tooltip, { direction:'top', offset:[0,-7], opacity:0.95 });
      _posMarkers.set(runner, m);
    }
  });
  // Töröljük akiknél már nincs adat
  _posMarkers.forEach((m, runner) => {
    if (!POSITIONS[runner]) {
      try { map.removeLayer(m); } catch(e) {}
      _posMarkers.delete(runner);
    }
  });
}


function applyCheckins() {
  // Forward-propagálás: d_m = C_m - P_m ha van check-in, különben d_{m-1}.
  // Delta-t datetime alapján számolunk (Date-Date), HH:MM-et csak megjelenítésre használjuk.
  let delta = 0;
  W.forEach(wp => {
    const planned = wp._plannedArrival || wp.arrival || '';
    wp._plannedArrival = planned;
    const ci = CHECKINS[wp.name];
    const ciDate = ciToDate(ci);
    const plannedDate = planned ? parseRaceTime(planned) : null;
    if (ci && ciDate && plannedDate) {
      delta = deltaMinDates(plannedDate, ciDate);
      wp._effDelta = delta;
      wp._checkedIn = true;
      wp._checkinRunner = ci.runner || '';
      wp._checkinDate = ciDate;
      wp.arrival = fmtHHMM(ciDate);
    } else {
      wp._effDelta = delta;
      wp._checkedIn = false;
      wp._checkinRunner = '';
      wp._checkinDate = null;
      wp.arrival = planned && delta !== 0 ? minToHhmm(hhmmToMin(planned) + delta) : planned;
    }
  });
  // Szegmensek időit is propagáljuk a mentett tervezett értékekről.
  S.forEach(seg => {
    const pf = seg._plannedTimeFrom || seg.time_from;
    const pt = seg._plannedTimeTo   || seg.time_to;
    seg._plannedTimeFrom = pf;
    seg._plannedTimeTo   = pt;
    const fromWp = W.find(w => w.name === seg.from);
    const toWp   = W.find(w => w.name === seg.to);
    const d_from = fromWp ? (fromWp._effDelta || 0) : 0;
    const d_to   = toWp   ? (toWp._effDelta   || 0) : 0;
    seg.time_from = pf && d_from ? minToHhmm(hhmmToMin(pf) + d_from) : pf;
    seg.time_to   = pt && d_to   ? minToHhmm(hhmmToMin(pt) + d_to)   : pt;
  });
}

async function checkinAt(wpName) {
  if (!ACTIVE_RUNNER) { showToast('Előbb válaszd ki a neved a fejlécben!', 'error'); return; }
  const now = new Date();
  const iso = now.toISOString();
  const prev = CHECKINS[wpName];
  CHECKINS[wpName] = { datetime: iso, runner: ACTIVE_RUNNER, ts: iso };
  saveCheckinsCache();
  applyCheckins();
  refreshUIAfterCheckin(wpName);
  _pendingCheckins++;
  try {
    const ok = await postCheckin(wpName, iso, ACTIVE_RUNNER);
    if (!ok) {
      if (prev) CHECKINS[wpName] = prev; else delete CHECKINS[wpName];
      saveCheckinsCache(); applyCheckins(); refreshUIAfterCheckin(wpName);
    }
  } finally { _pendingCheckins--; }
}

function confirmRevokeCheckin(wpName) {
  const wpEsc = wpName.replace(/'/g, "\\'");
  showToast(`Törlöd: <b>${wpName}</b>? &nbsp;<span onclick="doRevokeCheckin('${wpEsc}')" style="cursor:pointer;text-decoration:underline;color:#ffaaaa">Igen, töröl</span>`, 'error', true);
}

async function doRevokeCheckin(wpName) {
  const prev = CHECKINS[wpName];
  if (!prev) return;
  delete CHECKINS[wpName];
  saveCheckinsCache();
  applyCheckins();
  refreshUIAfterCheckin(wpName);
  _pendingCheckins++;
  try {
    const ok = await postCheckin(wpName, '', ACTIVE_RUNNER || prev.runner || '');
    if (!ok) {
      CHECKINS[wpName] = prev;
      saveCheckinsCache(); applyCheckins(); refreshUIAfterCheckin(wpName);
    }
  } finally { _pendingCheckins--; }
}

function refreshUIAfterCheckin(wpName) {
  if (_mapBuilt) updateMapData();
  updateHeaderProgress();
  updateHeaderDelta();
  updateNowRunning();
  // Ha az érintett waypoint popupja nyitva van, kényszerítsük a frissítést.
  if (wpName) {
    const idx = W.findIndex(w => w.name === wpName);
    if (idx >= 0) {
      const marker = _wpMarkers.get(idx);
      if (marker) {
        const p = marker.getPopup();
        if (p && p.isOpen && p.isOpen()) p.update();
      }
    }
  }
}

function paceChips(km, runnerPace) {
  const toSec = p => { const [m,s]=(p||'6:00').split(':').map(Number); return m*60+s; };
  const toStr = sec => Math.floor(sec/60)+':'+(sec%60<10?'0':'')+sec%60;
  const own = toSec(runnerPace || '6:00');
  const step = 30; // 30 sec/km step
  const paces = [own - step, own, own + step];
  return paces.map(sec => {
    const mins = Math.round(parseFloat(km) * sec / 60);
    const h = Math.floor(mins/60), m = mins%60;
    const t = h>0 ? h+'ó '+m+'p' : m+'p';
    const isOwn = sec === own && runnerPace;
    const style = isOwn
      ? 'background:rgba(100,200,120,0.25);color:#aaffbb;border-color:rgba(100,200,120,0.5);font-weight:700'
      : '';
    return '<span class="pw-pace-chip"'+(style?' style="'+style+'"':'')+'>'+toStr(sec)+'/km → '+t+'</span>';
  }).join(' ');
}

function getActiveSegments() {
  const nowMs = Date.now();
  const parseAbs = t => { const d = parseRaceTime(t); return d ? d.getTime() : null; };
  return S.reduce((acc, seg, i) => {
    let from = parseAbs(seg.time_from), to = parseAbs(seg.time_to);
    if (from === null && to !== null) from = to - 60*60*1000;
    if (to === null && from !== null) to = from + 60*60*1000;
    if (from !== null && to !== null && nowMs >= from && nowMs <= to) acc.push(i);
    return acc;
  }, []);
}

function updateActiveSegments() {
  const active = getActiveSegments();
  _activeSegs.forEach(i => {
    const pl = _activePolylines.get(i);
    if (pl && !active.includes(i)) { pl.setStyle({weight:3, opacity:0.85}); }
  });
  active.forEach(i => {
    const pl = _activePolylines.get(i);
    if (pl) { pl.setStyle({weight:6, opacity:1}); pl.bringToFront(); }
  });
  _activeSegs = active;
}

function updateHeaderProgress() {

  const _nowMs = Date.now();
  const parseAbsTP = t => { const d = parseRaceTime(t); return d ? d.getTime() : null; };
  const doneKm  = S.filter(s=>{ const t=parseAbsTP(s.time_to); return t!==null && t<=_nowMs; }).reduce((a,s)=>a+parseFloat(segKm(s)),0);
  const pct = totalKm>0 ? Math.min(100,(doneKm/totalKm*100)) : 0;
  fill.style.width = pct.toFixed(1)+'%';
  const lastSeg = [...S].reverse().find(s=>s.time_to);
  const finish = pct >= 100 && lastSeg ? ' → '+lastSeg.time_to : '';
  txt.textContent = doneKm.toFixed(0)+'/'+totalKm.toFixed(0)+'km'+finish;
}

function updateMapData() {
  S.forEach((seg, i) => {
    const pl = _activePolylines.get(i);
    if (pl) pl.setPopupContent(buildSegPopup(seg));
  });
  // setIcon() bezárja a nyitott popupot (Leaflet-bug) – mentjük és újranyitjuk.
  W.forEach((wp, i) => {
    const marker = _wpMarkers.get(i);
    if (!marker) return;
    const html = buildWpHtml(wp, i);
    marker.setPopupContent(html);
    const p = marker.getPopup();
    const wasOpen = p && p.isOpen && p.isOpen();
    const { icon, zIndexOffset, tooltipOffset } = makeWpIcon(wp);
    marker.setIcon(icon);
    marker.setZIndexOffset(zIndexOffset);
    const tipContent = wp.arrival ? `${wp.name} · ${wp.arrival}` : wp.name;
    marker.unbindTooltip();
    marker.bindTooltip(tipContent, { direction:'top', offset:tooltipOffset, opacity:0.97 });
    if (wasOpen) marker.openPopup();
  });
  updateActiveSegments();
}


function buildSegPopup(seg) {
  const isNight=seg.phase==='night';
  const color=C[seg.runner];
  const sp=seg.sponsor?`<div style="font-size:11px;color:#ffcc66;margin-top:2px">&#x1F4CB; ${seg.sponsor}</div>`:'';
  const distKm = (parseFloat(seg.km) || segDistKm(seg.coords)).toFixed(1);
  const timeRange = (seg.time_from && seg.time_to) ? `<span style="color:#7777aa;font-size:10px"> · ${seg.time_from}–${seg.time_to}</span>` : '';
  return `<div style="font-weight:700;font-size:13px;color:${color}">${seg.runner}${isNight?' &#x1F319;':''}</div><div style="font-size:11px;color:#aaaacc;margin-top:2px">${seg.from} &#x2192; ${seg.to}</div><div style="font-size:11px;color:#8888bb;margin-top:3px">📏 ${distKm} km · ⬆️ ${seg.dplus||0}m · ⬇️ ${seg.dminus||0}m${timeRange}</div><div class="pw-pace-row">${paceChips(distKm, seg.pace)}</div>${sp}`;
}

function buildMap() {
  clearDynLayers();
S.forEach((seg,_si)=>{
  const color=C[seg.runner];
  const isNight=seg.phase==='night';
  const base=L.polyline(seg.coords,{color,weight:6,opacity:0.95,lineCap:'round',lineJoin:'round'});
  base.bindPopup(buildSegPopup(seg),{maxWidth:500});
  if(!RG[seg.runner])RG[seg.runner]=[];
  RG[seg.runner].push(base);
  base.addTo(map); _activePolylines.set(_si, base); _dynLayers.push(base);
  if(isNight){
    const ov=L.polyline(seg.coords,{color:'#ffffff',weight:2.5,opacity:0.8,lineCap:'round',dashArray:'7 6'});
    ov.addTo(map); RG[seg.runner].push(ov); _dynLayers.push(ov);
  }
});
W.forEach((wp,i)=>{
  const { icon, zIndexOffset, tooltipOffset } = makeWpIcon(wp);
  const marker=L.marker([wp.lat,wp.lon],{icon,zIndexOffset});
  const html = buildWpHtml(wp, i);
  marker.bindPopup(html,{maxWidth:500});

  marker.bindTooltip(wp.arrival?`${wp.name} · ${wp.arrival}`:wp.name,{direction:'top',offset:tooltipOffset,opacity:0.97});
  marker.addTo(map); _dynLayers.push(marker); _wpMarkers.set(i, marker);
});
}


async function fetchAndRender() {
  let t1, t2;
  try {
    [t1, t2] = await Promise.all([
      fetch(CSV_UB26   + '&_t=' + Date.now()).then(r => { if(!r.ok) throw new Error('UB26 HTTP '+r.status); return r.text(); }),
      fetch(CSV_VALTAS + '&_t=' + Date.now()).then(r => { if(!r.ok) throw new Error('Váltás HTTP '+r.status); return r.text(); })
    ]);
    saveToCache(t1, t2);
  } catch(fe) {
    // Try offline cache
    const cache = loadFromCache();
    if (cache) {
      t1 = cache.t1; t2 = cache.t2;
      const ago = cache.ts ? Math.round((Date.now()-cache.ts.getTime())/60000) + ' perce' : '?';
      setStatus(false, 'Offline – cache ' + ago);
    } else {
      setStatus(false, 'Hiba: ' + fe.message + ' (nincs cache)');
      return;
    }
  }
  try {
    applyUB26(parseCSV(t1));
  } catch(e) { console.error('applyUB26:', e); setStatus(false, 'applyUB26: '+e.message); return; }
  try {
    applyValtas(parseCSV(t2));
  } catch(e) { console.error('applyValtas:', e); setStatus(false, 'applyValtas: '+e.message); return; }
  // Mentett tervezett értékek törlése, hogy a friss CSV adatok érvényesüljenek applyCheckins-ben.
  W.forEach(wp => { delete wp._plannedArrival; });
  S.forEach(seg => { delete seg._plannedTimeFrom; delete seg._plannedTimeTo; });
  try { await fetchCheckins(); } catch(e) { console.warn('Checkins (non-fatal):', e); }
  try { applyCheckins(); } catch(e) { console.error('applyCheckins:', e); }
  try { await fetchWeather(); } catch(e) { console.warn('Weather (non-fatal):', e); }
  W.forEach(wp => { try { const w = getWeather(wp.lat, wp.arrival); if (w) wp.weather = w; } catch(e) {} });
  try {
    if (!_mapBuilt) {
      buildMap();
      _mapBuilt = true;
    } else {
      updateMapData();
    }
    updateNowRunning();
    updateHeaderProgress();
    updateHeaderDelta();
    updatePositionMarkers();
  } catch(e) { console.error('buildMap:', e); setStatus(false, 'buildMap: '+e.message); return; }
  const _t = new Date().toLocaleTimeString('hu-HU',{hour:'2-digit',minute:'2-digit'});
  setStatus(true, 'OK');
  const _lu = document.getElementById('lastUpdated');
  if (_lu) _lu.textContent = 'Utoljára frissítve: ' + _t;
}


const ctrl = document.getElementById('ctrl');
Object.entries(C).forEach(([runner, color]) => {
  const b = document.createElement('button'); b.className = 'btn';
  b.innerHTML = '<div class="rdot" style="background:' + color + '"></div>' + runner;
  b.onclick = () => {
    if (!RG[runner]) return;
    const vis = !b.classList.contains('off');
    if (vis) { RG[runner].forEach(l=>map.removeLayer(l)); b.classList.add('off'); }
    else { RG[runner].forEach(l=>l.addTo(map)); b.classList.remove('off'); }
  };
  ctrl.appendChild(b);
});

  runnerBtn.className = 'btn';
  runnerBtn.style.cssText = 'padding:4px 11px;font-size:11px';
  runnerBtn.innerHTML = '<span id="runnerPickerLabel">🙋 Név…</span>';
  runnerBtn.onclick = openRunnerPicker;
  ctrlEl.appendChild(runnerBtn);

  const gpsBtn = document.createElement('button');
  gpsBtn.id = 'gpsBtn'; gpsBtn.title = 'GPS követés bekapcsolása';
  gpsBtn.innerHTML = '📍 GPS';
  gpsBtn.onclick = toggleGPS;
  ctrlEl.appendChild(gpsBtn);

  const statBtn = document.createElement('button');
  statBtn.id = 'statBtn'; statBtn.title = 'Futói statisztika';
  statBtn.innerHTML = '📊 Stat';
  statBtn.onclick = () => {
    const existing = document.getElementById('statsModal');
    if (existing) { existing.remove(); return; }
    buildStatsModal();
  };
  ctrlEl.appendChild(statBtn);

  const lastUpdEl = document.createElement('span');
  lastUpdEl.id = 'lastUpdated';
  lastUpdEl.style.cssText = 'font-size:10px;color:#6666aa;white-space:nowrap;padding:0 4px';
  lastUpdEl.textContent = 'Utoljára frissítve: –';
  ctrlEl.appendChild(lastUpdEl);
})();

loadCheckinsCache();
setActiveRunner(ACTIVE_RUNNER);
applyCheckins();
buildMap();
_mapBuilt = true;
updateActiveSegments();
updateNowRunning();
updateHeaderProgress();
updateHeaderDelta();
fetchAndRender();
setInterval(fetchAndRender, 15000);



</script>
</body>
</html>
